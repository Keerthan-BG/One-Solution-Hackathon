<!DOCTYPE html>
<html>
<head>
    <title>DynamicShield Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 32px;
            color: #38bdf8;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .value {
            font-size: 28px;
            margin-top: 10px;
            color: #22c55e;
        }

        #logs {
            height: 200px;
            overflow-y: auto;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        canvas {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>🚀 DynamicShield Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>Current Port</h2>
        <div id="port" class="value">---</div>
    </div>

    <div class="card">
        <h2>Attacks vs Defenses</h2>
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <h2>Live Logs</h2>
        <div id="logs"></div>
    </div>

</div>

<script>
let chart;

function initChart() {
    const ctx = document.getElementById('chart');
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Attacks', 'Defenses'],
            datasets: [{
                label: 'Count',
                data: [0, 0],
                backgroundColor: ['#ef4444', '#22c55e']
            }]
        }
    });
}

function updateData() {
    fetch("/get-data")
    .then(res => res.json())
    .then(data => {

        document.getElementById("port").innerText = data.port;

        chart.data.datasets[0].data = [data.attacks, data.defenses];
        chart.update();

        const logsDiv = document.getElementById("logs");
        logsDiv.innerHTML = data.logs.join("<br>");
        logsDiv.scrollTop = logsDiv.scrollHeight;
    });
}

initChart();
setInterval(updateData, 1000);
</script>

</body>
</html>
