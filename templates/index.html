<!DOCTYPE html>
<html>
<head>
<title>One Solution - SecureGram UI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #000);
    color:white;
}

/* TOP BAR */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:14px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo {
    font-weight:700;
    color:#38bdf8;
}

.status {
    background:#22c55e;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

/* GRID */
.container {
    display:grid;
    grid-template-columns: 1.6fr 1fr 1fr;
    gap:15px;
    padding:15px;
}

/* GLASS CARDS */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:12px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    height:92vh;
    overflow:hidden;
}

h3 {
    margin-top:0;
    color:#38bdf8;
}

/* ---------------- INSTAGRAM COLUMN SPLIT ---------------- */
.leftSplit {
    display:flex;
    gap:10px;
    height:88vh;
}

/* FEED LEFT */
.feedBox {
    flex:2;
    display:flex;
    flex-direction:column;
}

.feed {
    height:70vh;
    overflow-y:auto;
}

/* LIVE FEED RIGHT */
.liveBox {
    flex:1;
    display:flex;
    flex-direction:column;
}

.userlog {
    height:75vh;
    overflow-y:auto;
    background: rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
    font-size:12px;
}

/* STORIES */
.stories {
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:10px;
}

.story {
    text-align:center;
    font-size:11px;
}

.story img {
    width:55px;
    height:55px;
    border-radius:50%;
    border:2px solid #ec4899;
}

/* POSTS */
.post {
    background: rgba(15,23,42,0.8);
    padding:10px;
    margin-bottom:12px;
    border-radius:14px;
}

.post img {
    width:100%;
    border-radius:10px;
}

.post-title {
    font-size:14px;
    font-weight:600;
    margin:5px 0;
}

.actions span {
    margin-right:12px;
    cursor:pointer;
}

/* MTD */
.port {
    font-size:44px;
    text-align:center;
    color:#22c55e;
    font-weight:bold;
}

.log {
    height:180px;
    overflow-y:auto;
    background: rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
    font-size:12px;
}

canvas {
    width:100% !important;
    height:240px !important;
}

/* ATTACKER */
.attackLog {
    height:88vh;
    overflow-y:auto;
    background: rgba(0,0,0,0.6);
    padding:10px;
    border-radius:10px;
    font-size:12px;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="logo">🛡 One Solution</div>
    <div class="status">LIVE SYSTEM</div>
</div>

<div class="container">

<!-- ================= COLUMN 1 (INSTAGRAM SPLIT) ================= -->
<div class="card">

<h3>📱 Secure Feed</h3>

<div class="stories">
    <div class="story"><img src="https://i.pravatar.cc/55?img=1"><p>You</p></div>
    <div class="story"><img src="https://i.pravatar.cc/55?img=2"><p>Alex</p></div>
    <div class="story"><img src="https://i.pravatar.cc/55?img=3"><p>Sam</p></div>
</div>

<!-- SPLIT AREA -->
<div class="leftSplit">

    <!-- FEED -->
    <div class="feedBox">
        <div class="feed" id="feed"></div>
    </div>

    <!-- LIVE USER FEED (MOVED HERE) -->
    <div class="liveBox">
        <h4 style="margin:5px 0;">💬 Live Activity</h4>
        <div class="userlog" id="userLog"></div>
    </div>

</div>

</div>

<!-- ================= MTD ================= -->
<div class="card">

<h3>⚙️ MTD System</h3>

<div class="port" id="port">---</div>

<h4>Security Logs</h4>
<div class="log" id="logs"></div>

<h4>Attack vs Defense</h4>
<canvas id="chart"></canvas>

</div>

<!-- ================= ATTACKER ================= -->
<div class="card">

<h3>💀 Attacker Console</h3>
<div class="attackLog" id="attackLog"></div>

</div>

</div>

<script>

let chart;

/* CHART */
function initChart(){
    const ctx=document.getElementById("chart");

    chart=new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Attacks","Defenses"],
            datasets:[{
                data:[0,0],
                backgroundColor:["#ef4444","#22c55e"]
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });
}

/* POSTS */
let images=[
 "https://picsum.photos/500/300?1",
 "https://picsum.photos/500/300?2",
 "https://picsum.photos/500/300?3",
 "https://picsum.photos/500/300?4",
 "https://picsum.photos/500/300?5"
];

function createPost(img){
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <b>@secure_user</b>
        <div class="post-title">Image</div>
        <img src="${img}">
        <p>Encrypted media content</p>

        <div class="actions">
            <span onclick="like(this)">❤️ Like <span>0</span></span>
            <span onclick="comment(this)">💬 Comment</span>
            <span onclick="follow()">➕ Follow</span>
        </div>

        <div class="commentBox"></div>
    `;

    document.getElementById("feed").appendChild(div);
}

/* LIVE USER */
function userLog(msg){
    let box=document.getElementById("userLog");
    let p=document.createElement("p");
    p.innerText=msg;
    box.appendChild(p);
    box.scrollTop=box.scrollHeight;
}

/* ACTIONS */
function like(el){
    let span=el.querySelector("span");
    span.innerText=parseInt(span.innerText)+1;
    userLog("❤️ You liked the photo");
}

function comment(btn){
    let text=prompt("Comment:");
    if(!text)return;

    let box=btn.closest(".post").querySelector(".commentBox");

    let p=document.createElement("p");
    p.innerText="💬 "+text;
    box.appendChild(p);

    userLog("💬 You commented: "+text);
}

function follow(){
    userLog("👤 You followed a user");
}

/* BACKEND */
function update(){
    fetch("/get-data")
    .then(r=>r.json())
    .then(d=>{

        document.getElementById("port").innerText=d.port;

        let logBox=document.getElementById("logs");
        logBox.innerHTML="";

        d.logs.forEach(l=>{
            let p=document.createElement("p");
            if(l.includes("ATTACK")) p.style.color="red";
            if(l.includes("DEFENSE")) p.style.color="green";
            p.innerText=l;
            logBox.appendChild(p);
        });

        chart.data.datasets[0].data=[d.attacks,d.defenses];
        chart.update();

        let atk=document.getElementById("attackLog");
        atk.innerHTML="";

        d.logs.forEach(l=>{
            if(l.includes("ATTACK")){
                let p=document.createElement("p");
                p.innerText=l;
                p.style.color="red";
                atk.appendChild(p);
            }
        });

    });
}

/* INIT */
images.forEach(createPost);
initChart();
setInterval(update,1200);

</script>

</body>
</html>
